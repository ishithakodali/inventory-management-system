{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="h3 mb-2">Manage Users</h2>
                <p class="text-muted mb-4">Create an approved staff account and email its temporary login credentials.</p>

                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ form_data.username }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ form_data.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="temporary_password" class="form-label">Temporary Password</label>
                        <input type="password" class="form-control" id="temporary_password" name="temporary_password" minlength="8" required>
                        <div class="form-text">Use at least 8 characters.</div>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" minlength="8" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Staff Account</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
