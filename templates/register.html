<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:500px;
            padding:35px;
        }
    </style>
</head>
<body>

<div class="card shadow">

    <h2 class="text-center mb-4">
        Staff Registration
    </h2>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <div class="mb-3">
            <label>Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <button class="btn btn-primary w-100">
            Register
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/login">
            Back to Login
        </a>
    </div>

</div>

</body>
</html>
