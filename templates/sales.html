<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sales Management</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Sales Management</h2>

    <!-- Sales Form -->

    <div class="card mb-4">

        <div class="card-header">
            Record Sale
        </div>

        <div class="card-body">

            <form action="/sales/add" method="POST">

                <div class="mb-3">

                    <label class="form-label">Product</label>

                    <select class="form-select" name="product_id" required>

                        <option value="">Select Product</option>

                        {% for product in products %}

                        <option value="{{ product['id'] }}">

                            {{ product['name'] }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">Quantity</label>

                    <input
                        type="number"
                        class="form-control"
                        name="quantity"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Selling Price</label>

                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        name="selling_price"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">Sale Date</label>

                    <input
                        type="date"
                        class="form-control"
                        name="sale_date"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Record Sale

                </button>

            </form>

        </div>

    </div>

    <!-- Sales Table -->

    <div class="card">

        <div class="card-header">
            Sales Records
        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Selling Price</th>
                        <th>Sale Date</th>

                    </tr>

                </thead>

                <tbody>

                    {% for sale in sales %}

                    <tr>

                        <td>{{ sale['id'] }}</td>
                        <td>{{ sale['name'] }}</td>
                        <td>{{ sale['quantity'] }}</td>
                        <td>{{ sale['selling_price'] }}</td>
                        <td>{{ sale['sale_date'] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
